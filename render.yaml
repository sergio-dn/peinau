# Render Blueprint - API Service
services:
  - type: web
    name: wildlama-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @wildlama/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false # Set manually (Supabase connection string)
      - key: REDIS_URL
        sync: false # Set manually (Upstash connection string)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false # Set manually (64-char hex)
      - key: FRONTEND_URL
        sync: false # Set manually (Vercel URL)
    # Cron job: SII sync daily at 7am Chile time (UTC-3 = 10:00 UTC)
    # Render cron hits the health endpoint to wake the service;
    # BullMQ handles the actual scheduled sync internally
